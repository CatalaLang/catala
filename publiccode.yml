description:
  en:
    shortDescription: >-
      Domain-specific programming language designed for deriving
      correct-by-construction implementations from legislative texts
    longDescription: >-
      Catala is a domain-specific programming language adapted for
      socio-fiscal legislative literate programming. By annotating each
      line of the legislative text with its meaning in terms of code, one
      can derive an implementation of complex socio-fiscal mechanisms that
      enjoys a high level of assurance regarding the code-law
      faithfulness. The Catala compiler can also produce a
      lawyer-readable PDF version of the implementation, so that domain
      experts can review and certify that the code faithfully represents
      the law. Catala is used in production by the French tax authority
      (DGFiP) and developed at INRIA.
    features:
      - Literate programming adapted for legislative texts
      - Faithful-by-construction algorithm derivation from law
      - Lawyer-readable PDF output for review by domain experts
      - IDE support with VS Code extension and syntax highlighting
      - Multiple compilation targets
    documentation: https://book.catala-lang.org/
  fr:
    shortDescription: >-
      Langage de programmation dédié à l'écriture d'implémentations
      correctes d'algorithmes dérivés de textes législatifs
    longDescription: >-
      Catala est un langage de programmation dédié à la programmation
      lettrée législative socio-fiscale. En annotant chaque ligne du
      texte législatif avec sa signification en termes de code, on peut
      dériver une implémentation de mécanismes socio-fiscaux complexes
      avec un haut niveau de garantie quant à la fidélité entre le code
      et la loi. Le compilateur Catala peut également produire une
      version PDF lisible par les juristes, afin que les experts du
      domaine puissent vérifier et certifier que le code représente
      fidèlement la loi. Catala est utilisé en production par la
      Direction Générale des Finances Publiques (DGFiP) et développé
      à l'INRIA.
    features:
      - Programmation lettrée adaptée aux textes législatifs
      - Dérivation d'algorithmes fidèles par construction à partir de la loi
      - Sortie PDF lisible par les juristes pour relecture
      - Support IDE avec extension VS Code et coloration syntaxique
      - Plusieurs cibles de compilation
    documentation: https://book.catala-lang.org/
